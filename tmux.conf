# plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "wfxr/tmux-power"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

# restore sessions automatically on tmux server start
set -g @continuum-restore "on"

# set theme
set -g @tmux_power_theme "redwine"

# general settings
set -sg escape-time 10
set -g history-limit 50000
set -g renumber-windows on
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1

# true color + italics
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# mouse support
set -g mouse on

# don't kill the tmux server when the last session is closed, and skip the
# "kill-pane 1? (y/n)" confirmation -- recommended by sesh
set -g detach-on-destroy off
bind-key x kill-pane

# `Ctrl-b T` opens a fuzzy popup (via sesh + fzf) to jump between projects:
# tmux sessions, zoxide dirs (~/git/* once visited), and sesh configs
bind-key T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# `Ctrl-b L` switches back to the previous session, sesh-aware (plays nice
# with detach-on-destroy off)
bind -N "last-session (via sesh)" L run-shell "sesh last"

# vi keybind
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

#run "/Users/pyee/.tmux-power/tmux-power.tmux"
run "~/.tmux/plugins/tpm/tpm"
